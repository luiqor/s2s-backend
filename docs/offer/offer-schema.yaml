definitions:
  offers:
    type: array
    items:
      type: object
      properties:
        _id:
          type: string
        price:
          type: number
        proficiencyLevel:
          $ref: '#/definitions/offerProficiencyLevelValues'
        title:
          type: string
        description:
          type: string
        languages:
          $ref: '#/definitions/offerLanguagesValues'
        authorRole:
          type: string
        author:
          $ref: '#/definitions/offerAuthorExtended'
        enrolledUsers:
          type: array
          items:
            type: string
        subject:
          $ref: '#/definitions/subjectWithName'
        category:
          $ref: '#/definitions/categoryWithAppearance'
        status:
          type: string
          enum:
            - active
            - draft
            - closed
        FAQ:
          type: array
          items:
            type: object
            properties:
              question:
                type: string
              answer:
                type: string
              _id:
                type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        chatId:
          type: string
          nullable: true
  offerBody:
    type: object
    properties:
      price:
        type: number
      proficiencyLevel:
        $ref: '#/definitions/offerProficiencyLevelValues'
      title:
        type: string
      description:
        type: string
      languages:
        $ref: '#/definitions/offerLanguagesValues'
      authorRole:
        type: string
      enrolledUsers:
        type: array
        items:
          type: string
      subject:
        type: string
      category:
        type: string
      status:
        type: string
        enum:
          - active
          - draft
          - closed
      FAQ:
        type: array
        items:
          type: object
          properties:
            question:
              type: string
            answer:
              type: string
  offer:
    type: object
    properties:
      _id:
        type: string
      price:
        type: number
      proficiencyLevel:
        $ref: '#/definitions/offerProficiencyLevelValues'
      title:
        type: string
      description:
        type: string
      languages:
        $ref: '#/definitions/offerLanguagesValues'
      authorRole:
        type: string
      author:
        $ref: '#/definitions/offerAuthor'
      enrolledUsers:
        type: array
        items:
          type: string
      subject:
        $ref: '#/definitions/subjectWithName'
      category:
        $ref: '#/definitions/categoryWithAppearance'
      status:
        type: string
        enum:
          - active
          - draft
          - closed
      FAQ:
        type: array
        items:
          type: object
          properties:
            question:
              type: string
            answer:
              type: string
            _id:
              type: string
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      chatId:
        type: string
        nullable: true
  offerProficiencyLevelEnum:
    type: string
    enum:
      - Beginner
      - Intermediate
      - Advanced
      - Test Preparation
      - Professional
      - Specialized
  offerProficiencyLevelValues:
    type: array
    items:
      $ref: '#/definitions/offerProficiencyLevelEnum'
  offerLanguagesValues:
    type: array
    items:
      $ref: '#/definitions/userSpokenLanguagesEnum'
  offerAuthor:
    type: object
    properties:
      _id:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      totalReviews:
        type: object
        properties:
          student:
            type: number
          tutor:
            type: number
      averageRating:
        type: object
        properties:
          student:
            type: number
          tutor:
            type: number
      photo:
        type: string
      professionalSummary:
        type: string
  offerAuthorExtended:
    type: object
    properties:
      _id:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      totalReviews:
        type: object
        properties:
          student:
            type: number
          tutor:
            type: number
      averageRating:
        type: object
        properties:
          student:
            type: number
          tutor:
            type: number
      nativeLanguage:
        $ref: '#/definitions/userSpokenLanguagesEnum'
      status:
        $ref: '#/definitions/userStatusEnum'
      photo:
        type: string
      professionalSummary:
        type: string
