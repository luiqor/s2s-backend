definitions:
  cooperations:
    type: array
    items:
      type: object
      properties:
        _id:
          type: string
        offer:
          $ref: '#/definitions/offer'
        initiator:
          $ref: '#/definitions/user'
        initiatorRole:
          type: string
        receiver:
          $ref: '#/definitions/user'
        receiverRole:
          type: string
        price:
          type: number
        title:
          type: string
        additionalInfo:
          type: string
          minLength: 30
          maxLength: 1000
        proficiencyLevel:
          type: string
          enum:
            - Beginner
            - Intermediate
            - Advanced
            - Test Preparation
            - Professional
            - Specialized
        status:
          type: string
          enum:
            - pending
            - active
            - declined
            - closed
        availableQuizzes:
          type: array
          items:
            $ref: '#/definitions/quiz'
        finishedQuizzes:
          type: array
          items:
            $ref: '#/definitions/finishedQuiz'
        needAction:
          type: string
          enum:
            - student
            - tutor
        user:
          type: object
          description: Details of the partner user involved in the cooperation
          properties:
            _id:
              type: string
            firstName:
              type: string
            lastName:
              type: string
            photo:
              type: string
            role:
              type: string
  cooperation:
    type: object
    properties:
      _id:
        type: string
      offer:
        $ref: '#/definitions/offer'
      initiator:
        $ref: '#/definitions/user'
      initiatorRole:
        type: string
      receiver:
        $ref: '#/definitions/user'
      receiverRole:
        type: string
      price:
        type: number
      title:
        type: string
      additionalInfo:
        type: string
        minLength: 30
        maxLength: 1000
      proficiencyLevel:
        type: string
        enum:
          - Beginner
          - Intermediate
          - Advanced
          - Test Preparation
          - Professional
          - Specialized
      status:
        type: string
        enum:
          - pending
          - active
          - declined
          - closed
      availableQuizzes:
        type: array
        items:
          $ref: '#/definitions/quiz'
      finishedQuizzes:
        type: array
        items:
          $ref: '#/definitions/finishedQuiz'
      sections:
        type: array
        items:
          $ref: '#/definitions/section'
      needAction:
        type: string
        enum:
          - student
          - tutor
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
  cooperationBody:
    type: object
    properties:
      offer:
        type: string
        description: _id
        ref: '#/definitions/offer'
      receiver:
        type: string
        description: _id
        ref: '#/definitions/user'
      receiverRole:
        type: string
      price:
        type: number
      title:
        type: string
      additionalInfo:
        type: string
        minLength: 30
        maxLength: 1000
      proficiencyLevel:
        type: string
        enum:
          - Beginner
          - Intermediate
          - Advanced
          - Test Preparation
          - Professional
          - Specialized
      sections:
        type: array
        items:
          $ref: '#/definitions/section'
    required:
      - title
      - offer
      - receiver
      - proficiencyLevel
      - receiverRole
      - price
  section:
    type: object
    properties:
      title:
        type: string
      description:
        type: string
      resources:
        type: array
        items:
          type: object
          properties:
            resource:
              type: object
              oneOf:
                - $ref: '#/definitions/lesson'
                - $ref: '#/definitions/quiz'
                - $ref: '#/definitions/attachment'
                - $ref: '#/definitions/question'
            resourceType:
              type: string
              enum:
                - lesson
                - quiz
                - attachment
                - question
            availability:
              type: object
              properties:
                status:
                  type: string
                  enum:
                    - open
                    - closed
                    - openFrom
                  default: open
                date:
                  type: string
                  format: date-time
                  default: null
            completionStatus:
              $ref: '#/definitions/completionStatus'
  completionStatus:
    type: string
    enum:
      - completed
      - active
