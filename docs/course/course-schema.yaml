definitions:
  courses:
    type: array
    items:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        author:
          type: string
          ref: '#components/user'
        category:
          type: string
          ref: '#components/category'
        subject:
          type: string
          ref: '#components/subject'
        proficiencyLevel:
          type: array
          items:
            type: string
            enum:
              - Beginner
              - Intermediate
              - Advanced
              - Test Preparation
              - Professional
              - Specialized
        sections:
          type: array
          items:
            type: object
            properties:
            title: string
            description: string
            resources:
              type: array
              items:
                type: object
                properties:
                  resource:
                    type: object
                    additionalProperties: true
                  resourceType:
                    type: string
                    enum:
                      - lesson
                      - quiz
                      - attachment
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
  course:
    type: object
    properties:
      _id:
        type: string
      title:
        type: string
      description:
        type: string
      author:
        type: string
        ref: '#components/user'
      category:
        type: string
        ref: '#components/category'
      subject:
        type: string
        ref: '#components/subject'
      proficiencyLevel:
        type: array
        items:
          type: string
          enum:
            - Beginner
            - Intermediate
            - Advanced
            - Test Preparation
            - Professional
            - Specialized
      sections:
        type: array
        items:
          type: object
          properties:
            _id:
              type: string
            title:
              type: string
            description:
              type: string
            resources:
              type: array
              items:
                type: object
                properties:
                  resource:
                    type: string
                  resourceType:
                    type: string
                    enum:
                      - lesson
                      - quiz
                      - attachment
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
  courseBody:
    type: object
    properties:
      title:
        type: string
      description:
        type: string
      category:
        type: string
        ref: '#components/category'
      subject:
        type: string
        ref: '#components/subject'
      proficiencyLevel:
        type: array
        items:
          type: string
          enum:
            - Beginner
            - Intermediate
            - Advanced
            - Test Preparation
            - Professional
            - Specialized
      sections:
        type: array
        items:
          type: object
          properties:
            title:
              type: string
            description:
              type: string
            resources:
              type: array
              items:
                type: object
                properties:
                  resource:
                    type: object
                    properties:
                      title:
                        type: string
                      description:
                        type: string
                      content:
                        type: string
                      author:
                        type: string
                      attachments:
                        type: array
                        items:
                          type: string
                      category:
                        type: object
                        properties:
                          _id:
                            type: string
                          name:
                            type: string
                        required:
                          - _id
                          - name
                      _id:
                        type: string
                    required:
                      - title
                      - description
                      - content
                      - author
                      - _id
                  resourceType:
                    type: string
                    enum:
                      - lesson
                      - quiz
                      - attachment
          required:
            - title
            - description
            - resources
    required:
      - title
      - description
