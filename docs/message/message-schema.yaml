definitions:
  messages:
    type: object
    properties:
      items:
        type: array
        items:
          $ref: '#/definitions/messageFullInfo'
      count:
        type: integer
        description: Total number of messages
  messageBody:
    type: object
    properties:
      text:
        type: string
  message:
    type: object
    properties:
      _id:
        type: string
      authorRole:
        type: string
        enum:
          - student
          - tutor
      text:
        type: string
      isRead:
        type: boolean
      isNotified:
        type: boolean
      chat:
        type: string
      clearedFor:
        type: array
        items:
          type: object
          properties:
            user:
              type: string  
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
  messageFullInfo:
    type: object
    allOf:
      - $ref: '#/definitions/message'
      - properties:
          author:
            type: string
            ref: '#/components/user'
