paths:
  /chats/{id}/messages:
    post:
      security:
        - cookieAuth: []
      tags:
        - Messages
      summary: Create a new message.
      description: Create and save a new message to database.
      produces:
        - application/json
      parameters:
      - name: id
        in: path
        required: true
        description: ID of the chat
        type: string
      requestBody:
        required: true
        description: Create new message.
        content:
          application/json:
            schema:
              $ref: '#/definitions/messageBody'
            example:
              text: 'Hi, you want to start cooperation with me?'
      responses:
        201:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/definitions/message'
              example:
                - _id: 64a28e8c5d56f749c7d915d0
                  author: 6421d9833cdf38b706756dff
                  authorRole: 'student'
                  text: 'Hi, you want to start cooperation with me?'
                  isRead: false
                  isNotified: true
                  chat: 6421d9833cdf38b706756dfd
                  clearedFor: []
                  createdAt: 2023-20-01T13:25:36.292Z
                  updatedAt: 2023-20-01T13:25:36.292Z
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/Error'
              example:
                status: 401
                code: 'UNAUTHORIZED'
                message: 'The requested URL requires user authorization.'
    get:
      security:
        - cookieAuth: []
      tags:
        - Messages
      summary: Find your messages in chat
      description: Finds and returns an array with a list of all your messages related to specific chat.
      produces:
        - application/json
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the chat that needs to be fetched messages from
          type: string
        - in: query
          name: limit
          schema:
            type: integer
          required: false
          description: Limit of messages amount that need to get 
        - in: query
          name: skip
          schema:
            type: integer
          required: false
          description: Amount of messages that needs to skip
        - in: query
          name: message
          schema:
            type: string
          required: false
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/definitions/messages'
              example:
                items:
                  - _id: 64a28e8c5d56f749c7d915d0
                    author:
